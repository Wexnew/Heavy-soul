<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heavy Soul</title>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-top">
        <h1>HEAVY SOUL</h1>
        <p class="header-subtitle">El lloc més pesat de la música</p>
      </div>

      <nav>
        <ul class="top-nav">
          <li><a href="#" onclick="changeContent('news')">NOTÍCIES</a></li>
          <li><a href="#" onclick="changeContent('contact')">CONTACTE</a></li>
          <li><a href="#" onclick="changeContent('followers')">DELS NOSTRES SEGUIDORS</a></li>
        </ul>
      </nav>
    </header>

    <section class="home-hero">
      <div class="hero-card">
        <div class="hero-card-inner">
          <button class="arrow left" id="albums-prev" aria-label="Anterior">&lt;</button>
          <div class="hero-image" aria-hidden="true"></div>
          <button class="arrow right" id="albums-next" aria-label="Següent">&gt;</button>
        </div>
        <h3>Àlbums de la setmana</h3>
      </div>

      <div class="hero-logo">
        <a href="#" onclick="changeContent('home'); return false;" style="cursor: pointer; display: inline-flex; align-items: center; justify-content: center;">
          <img src="logo.png" alt="Heavy Soul logo" style="max-width: 100%; display: block;">
        </a>
      </div>

      <div class="hero-card">
        <div class="hero-card-inner">
          <button class="arrow left" id="songs-prev" aria-label="Anterior">&lt;</button>
          <div class="hero-image" aria-hidden="true"></div>
          <button class="arrow right" id="songs-next" aria-label="Següent">&gt;</button>
        </div>
        <h3>Noves cançons</h3>
      </div>
    </section>

    <main>
      <div id="content">
        <h2>Benvingut a Heavy Soul!</h2>
        <p>Consulta les últimes notícies i articles del món de la música metal.</p>
        <p>Utilitza el menú superior per navegar entre seccions.</p>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
